<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>мқҙлӘЁм§Җ нҢ”л ҲнҠё лҚ°лӘЁ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,'Segoe UI',sans-serif; background:#F5F6FA; max-width:480px; margin:0 auto; padding:20px; }

h3 { font-size:16px; margin-bottom:12px; color:#1A1A2E; }

/* мһ…л Ҙ мҳҒм—ӯ */
.input-wrap {
  display:flex; align-items:center; gap:8px;
  background:#fff; border:2px solid #E8E8EE; border-radius:12px;
  padding:12px 14px; margin-bottom:16px;
}
.input-wrap input {
  flex:1; border:none; outline:none; font-size:15px; font-family:inherit;
}
.emoji-toggle {
  background:none; border:none; font-size:22px; cursor:pointer;
  padding:4px; border-radius:8px; transition:background .15s;
}
.emoji-toggle:hover { background:#E8EAFF; }

/* мқҙлӘЁм§Җ н”јм»Ө нҢЁл„җ */
.emoji-picker {
  display:none; background:#fff; border-radius:16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.12); overflow:hidden;
}
.emoji-picker.open { display:block; }

/* м№ҙн…Ңкі лҰ¬ нғӯ */
.emoji-tabs {
  display:flex; border-bottom:1px solid #E8E8EE; padding:0 4px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.emoji-tab {
  padding:10px 12px; font-size:20px; cursor:pointer;
  border:none; background:none; opacity:0.4; transition:opacity .15s;
  flex-shrink:0; border-bottom:2px solid transparent;
}
.emoji-tab.active { opacity:1; border-bottom-color:#5B6AFF; }

/* мқҙлӘЁм§Җ к·ёлҰ¬л“ң */
.emoji-grid {
  display:grid; grid-template-columns:repeat(8,1fr);
  padding:8px; max-height:240px; overflow-y:auto;
}
.emoji-item {
  display:flex; align-items:center; justify-content:center;
  font-size:24px; padding:6px; cursor:pointer;
  border-radius:8px; transition:background .1s;
}
.emoji-item:hover { background:#E8EAFF; }
.emoji-item:active { transform:scale(1.2); }

/* м„ нғқ кІ°кіј */
.result { margin-top:16px; padding:16px; background:#fff; border-radius:12px; font-size:14px; color:#7C7C8A; min-height:48px; }
.result span { font-size:18px; }
</style>
</head>
<body>

<h3>мқјм • м ңлӘ© мһ…л Ҙ (мқҙлӘЁм§Җ нҢ”л ҲнҠё лҚ°лӘЁ)</h3>

<div class="input-wrap">
  <input type="text" id="title-input" placeholder="мқјм • м ңлӘ©мқ„ мһ…л Ҙн•ҳм„ёмҡ”">
  <button class="emoji-toggle" onclick="togglePicker()">рҹҳҖ</button>
</div>

<div class="emoji-picker" id="emoji-picker">
  <div class="emoji-tabs" id="emoji-tabs"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div class="result" id="result">мң„ мһ…л ҘлһҖм—җ мқҙлӘЁм§ҖлҘј л„Јм–ҙліҙм„ёмҡ”</div>

<script>
const EMOJI_DATA = {
  'рҹҳҖ мһҗмЈј м“°лҠ”': ['рҹҳҖ','рҹҳӮ','рҹҘ°','рҹҳҺ','рҹӨ”','рҹ‘Қ','вқӨпёҸ','рҹҺү','вң…','вӯҗ','рҹ”Ҙ','рҹ’Ҝ','рҹҷҸ','рҹҳҠ','рҹҘі','рҹ’Ә','рҹ‘Ҹ','рҹҺӮ','рҹ’Қ','рҹ“…','вҸ°','рҹ“Ң','вңҲпёҸ','рҹҸ ','рҹҺҒ','рҹ’җ','рҹҢё','вҳҖпёҸ','рҹҢҷ','вӣӘ'],
  'рҹҳғ н‘ңм •': ['рҹҳҖ','рҹҳғ','рҹҳ„','рҹҳҒ','рҹҳҶ','рҹҳ…','рҹӨЈ','рҹҳӮ','рҹҷӮ','рҹҳҠ','рҹҳҮ','рҹҘ°','рҹҳҚ','рҹӨ©','рҹҳҳ','рҹҳӢ','рҹҳң','рҹӨӘ','рҹҳқ','рҹӨ‘','рҹӨ—','рҹӨӯ','рҹӨ«','рҹӨ”','рҹҳҗ','рҹҳ‘','рҹҳ¶','рҹҳҸ','рҹҳ’','рҹҷ„','рҹҳ¬','рҹҳ®вҖҚрҹ’Ё','рҹӨҘ','рҹҳҢ','рҹҳ”','рҹҳӘ','рҹӨӨ','рҹҳҙ','рҹҳ·','рҹӨ’','рҹӨ•','рҹҘҙ','рҹҘә','рҹҳў','рҹҳӯ','рҹҳӨ','рҹҳ ','рҹӨ¬','рҹҳҲ'],
  'рҹ‘Ӣ мҶҗ/мӮ¬лһҢ': ['рҹ‘Ӣ','рҹӨҡ','рҹ–җпёҸ','вңӢ','рҹ––','рҹ‘Ң','рҹӨҢ','рҹӨҸ','вңҢпёҸ','рҹӨһ','рҹӨҹ','рҹӨҳ','рҹӨҷ','рҹ‘Ҳ','рҹ‘ү','рҹ‘Ҷ','рҹ‘Ү','вҳқпёҸ','рҹ‘Қ','рҹ‘Һ','вңҠ','рҹ‘Ҡ','рҹӨӣ','рҹӨң','рҹ‘Ҹ','рҹҷҢ','рҹ‘җ','рҹӨқ','рҹҷҸ','рҹ’Ә','рҹ«¶','рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§вҖҚрҹ‘Ұ','рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘Ұ','рҹ‘©вҖҚрҹ‘Ұ','рҹ‘ЁвҖҚрҹ‘Ұ','рҹ’‘','рҹ‘«','рҹ‘¬','рҹ‘ӯ','рҹ§‘вҖҚрҹӨқвҖҚрҹ§‘'],
  'вқӨпёҸ н•ҳнҠё/к°җм •': ['вқӨпёҸ','рҹ§Ў','рҹ’ӣ','рҹ’ҡ','рҹ’ҷ','рҹ’ң','рҹ–Ө','рҹӨҚ','рҹӨҺ','рҹ’”','вқӨпёҸвҖҚрҹ”Ҙ','вқӨпёҸвҖҚрҹ©№','рҹ’•','рҹ’һ','рҹ’“','рҹ’—','рҹ’–','рҹ’ҳ','рҹ’қ','рҹ’ҹ','вҷҘпёҸ','рҹ’Ӣ','рҹ’Ң','рҹ’җ','рҹҢ№','рҹҢ·','рҹҢё','рҹҢә','рҹҢ»','рҹҢј'],
  'рҹҺү мқҙлІӨнҠё': ['рҹҺү','рҹҺҠ','рҹҺӮ','рҹҺҒ','рҹҺҲ','рҹҺҖ','рҹҺ„','рҹҺғ','рҹҺ—пёҸ','рҹҸҶ','рҹҘҮ','рҹҘҲ','рҹҘү','вҡҪ','рҹҸҖ','рҹҺҫ','рҹҺ®','рҹҺІ','рҹҺҜ','рҹҺӘ','рҹҺ ','рҹҺЎ','рҹҺў','рҹҺ¬','рҹҺӨ','рҹҺ§','рҹҺө','рҹҺ¶','рҹҺ№','рҹҺё'],
  'рҹҚ” мқҢмӢқ': ['рҹҚ”','рҹҚ•','рҹҚҹ','рҹҢӯ','рҹҚҝ','рҹҚ©','рҹҚ°','рҹҺӮ','рҹҚ«','рҹҚ¬','вҳ•','рҹҚө','рҹ§Ӣ','рҹҚә','рҹҚ·','рҹҘӮ','рҹҚҪпёҸ','рҹҘ„','рҹҚі','рҹҘ—','рҹҚң','рҹҚқ','рҹҚЈ','рҹҚұ','рҹҚҷ','рҹҚҡ','рҹҘҳ','рҹҚІ','рҹҢ®','рҹҢҜ'],
  'рҹҸ  мһҘмҶҢ/л¬јкұҙ': ['рҹҸ ','рҹҸў','рҹҸ«','рҹҸҘ','вӣӘ','рҹҸӣпёҸ','рҹҸ°','рҹ—ј','рҹ—Ҫ','вңҲпёҸ','рҹҡ—','рҹҡ•','рҹҡҢ','рҹҡҮ','рҹҡҖ','рҹӣіпёҸ','вӣө','рҹ“ұ','рҹ’»','вҢҡ','рҹ“·','рҹ’Ў','рҹ”‘','рҹ’°','рҹ’і','рҹ“Ұ','рҹ“®','рҹ“Ң','рҹ“Һ','вңӮпёҸ'],
  'вҸ° мӢңк°„/лӮ м”Ё': ['вҸ°','вҸұпёҸ','вҸі','рҹ“…','рҹ“Ҷ','рҹ—“пёҸ','вҳҖпёҸ','рҹҢӨпёҸ','вӣ…','рҹҢ§пёҸ','вӣҲпёҸ','рҹҢҲ','рҹҢҷ','вӯҗ','вңЁ','рҹ’«','рҹҢё','рҹҚӮ','вқ„пёҸ','вҳғпёҸ','рҹҢҠ','рҹ”Ҙ','рҹ’§','рҹҢҚ'],
};

let currentCategory = Object.keys(EMOJI_DATA)[0];

function renderTabs() {
  const tabs = document.getElementById('emoji-tabs');
  tabs.innerHTML = Object.keys(EMOJI_DATA).map((cat, i) => {
    const icon = cat.split(' ')[0];
    return `<button class="emoji-tab${i===0?' active':''}" data-cat="${cat}" onclick="switchCategory('${cat}', this)">${icon}</button>`;
  }).join('');
}

function switchCategory(cat, el) {
  currentCategory = cat;
  document.querySelectorAll('.emoji-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = EMOJI_DATA[currentCategory].map(e =>
    `<div class="emoji-item" onclick="pickEmoji('${e}')">${e}</div>`
  ).join('');
}

function togglePicker() {
  document.getElementById('emoji-picker').classList.toggle('open');
}

function pickEmoji(emoji) {
  const input = document.getElementById('title-input');
  const pos = input.selectionStart || input.value.length;
  input.value = input.value.slice(0, pos) + emoji + input.value.slice(pos);
  input.focus();
  input.selectionStart = input.selectionEnd = pos + emoji.length;
  document.getElementById('result').innerHTML = `мһ…л Ҙк°’: <span>${input.value}</span>`;
}

document.getElementById('title-input').addEventListener('input', function() {
  document.getElementById('result').innerHTML = this.value ? `мһ…л Ҙк°’: <span>${this.value}</span>` : 'мң„ мһ…л ҘлһҖм—җ мқҙлӘЁм§ҖлҘј л„Јм–ҙліҙм„ёмҡ”';
});

renderTabs();
renderGrid();
</script>
</body>
</html>
