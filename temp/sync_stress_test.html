<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>동기화 스트레스 테스트</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#1a1a2e;color:#e0e0e0;padding:20px;font-size:13px}
h1{color:#5B6AFF;margin-bottom:10px;font-size:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.stat{background:#2a2a4a;padding:10px;border-radius:8px;text-align:center}
.stat .num{font-size:24px;font-weight:700;color:#5B6AFF}
.stat .label{font-size:10px;color:#888;margin-top:4px}
#log{background:#0d0d1a;border-radius:8px;padding:12px;height:60vh;overflow-y:auto;white-space:pre-wrap;line-height:1.6;font-size:11px}
.ok{color:#4ECDC4}.err{color:#FF6B6B}.warn{color:#FECA57}.info{color:#74B9FF}
button{background:#5B6AFF;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin:8px 4px}
button:disabled{opacity:0.4}
</style>
</head>
<body>
<h1>🔥 돌돌 캘린더 — 동기화 스트레스 테스트</h1>
<div>
<button onclick="runTest()" id="btn-run">테스트 시작 (5명 × 12개월 × 20일정 = 1,200건)</button>
<button onclick="cleanup()" id="btn-clean">테스트 데이터 삭제</button>
</div>
<div class="stats">
<div class="stat"><div class="num" id="s-users">0</div><div class="label">사용자</div></div>
<div class="stat"><div class="num" id="s-events">0</div><div class="label">생성된 일정</div></div>
<div class="stat"><div class="num" id="s-ops">0</div><div class="label">동작 수행</div></div>
<div class="stat"><div class="num" id="s-errors">0</div><div class="label">오류</div></div>
</div>
<div id="log"></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyD8ZGwmpiLAvACR5OI1zxabE2evnqXPQ1Y",authDomain:"doldol-calendar.firebaseapp.com",projectId:"doldol-calendar",storageBucket:"doldol-calendar.firebasestorage.app",messagingSenderId:"904326266675",appId:"1:904326266675:web:195d04ae46b04cdbeec846"});
const db=firebase.firestore();
const auth=firebase.auth();

let totalEvents=0,totalOps=0,totalErrors=0;
const TEST_CAL_ID='stress_test_cal_001';
const logEl=document.getElementById('log');

function log(msg,cls='info'){
  const t=new Date().toLocaleTimeString();
  logEl.innerHTML+=`<span class="${cls}">[${t}] ${msg}</span>\n`;
  logEl.scrollTop=logEl.scrollHeight;
}
function updateStats(users){
  document.getElementById('s-users').textContent=users||0;
  document.getElementById('s-events').textContent=totalEvents;
  document.getElementById('s-ops').textContent=totalOps;
  document.getElementById('s-errors').textContent=totalErrors;
}

function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
function rndDate(y,m){return `${y}-${String(m+1).padStart(2,'0')}-${String(Math.floor(Math.random()*28)+1).padStart(2,'0')}`}

const NAMES=['진우','이솔','엄마','아빠','민수','지영','현우','서연','도윤','하은'];
const COLORS=['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#5B6AFF','#A29BFE','#FF6B9D','#4ECDC4','#55EFC4','#74B9FF'];
const TITLES=['팀 미팅','점심 약속','병원 예약','생일 파티','여행 출발','학원','운동','장보기','영화 관람','독서 모임','치과','미용실','세차','회의','발표 준비','프로젝트 마감','가족 식사','친구 만남','공부','청소'];
const MEMOS=['','메모 테스트','중요한 일정입니다\n빠지지 마세요','장소: 강남역 3번 출구\n시간 엄수!','준비물: 노트북, 충전기'];

async function runTest(){
  document.getElementById('btn-run').disabled=true;
  log('========== 테스트 시작 ==========','ok');

  // 1. Auth
  log('1단계: 인증...');
  try{await auth.signInAnonymously();log('인증 성공: '+auth.currentUser.uid,'ok')}
  catch(e){log('인증 실패: '+e.message,'err');totalErrors++;return}

  // 2. Create test calendar
  log('2단계: 테스트 캘린더 생성...');
  const calRef=db.collection('calendars').doc(TEST_CAL_ID);
  const members=NAMES.map((n,i)=>({id:'test_user_'+i,name:n,color:COLORS[i]}));
  try{
    await calRef.set({name:'스트레스 테스트',inviteCode:'TSTCAL',members,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    log('캘린더 생성 완료 (멤버 '+members.length+'명)','ok');
    updateStats(members.length);
  }catch(e){log('캘린더 생성 실패: '+e.message,'err');totalErrors++;return}

  // 3. Generate events: 5 users × 12 months × 20 events = 1,200 events
  log('3단계: 일정 생성 (5명 × 12개월 × 20개 = 1,200건)...');
  const allEventIds=[];
  const batchSize=100;
  let batch=db.batch();
  let batchCount=0;
  let batchNum=0;
  let batchEvtIds=[];

  function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

  for(let month=0;month<12;month++){
    const y=2026+Math.floor(month/12);
    const m=month%12;
    for(let user=0;user<5;user++){
      for(let ev=0;ev<20;ev++){
        const evtId=gid();
        const d=rndDate(y,m);
        const evt={
          title:rnd(TITLES),
          date:d,endDate:d,
          startTime:`${String(Math.floor(Math.random()*18)+6).padStart(2,'0')}:00`,
          endTime:`${String(Math.floor(Math.random()*18)+7).padStart(2,'0')}:00`,
          isAllDay:Math.random()<0.3,
          repeat:rnd(['none','none','none','weekly','monthly','yearly']),
          color:COLORS[user],
          catIcon:rnd(['⌚','🎂','📌','✈️','💼']),
          memo:rnd(MEMOS),
          targets:Math.random()<0.5?['all']:['test_user_'+user],
          alarms:['1d','1h'],
          customAlarms:[],
          createdBy:'test_user_'+user,
          comments:[],
          createdAt:d,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        const ref=calRef.collection('events').doc(evtId);
        batch.set(ref,evt);
        batchEvtIds.push(evtId);
        batchCount++;

        if(batchCount>=batchSize){
          batchNum++;
          let ok=false;
          for(let retry=0;retry<3;retry++){
            try{
              await batch.commit();ok=true;
              totalEvents+=batchCount;totalOps+=batchCount;
              allEventIds.push(...batchEvtIds);
              log(`  배치 #${batchNum}: 누적 ${totalEvents}건`,'info');
              break;
            }catch(e){
              log(`  배치 #${batchNum} 실패(${retry+1}/3): ${e.message}`,'warn');
              await sleep(3000);
            }
          }
          if(!ok){log(`  배치 #${batchNum} 최종 실패 — ${batchCount}건 손실`,'err');totalErrors+=batchCount}
          batch=db.batch();batchCount=0;batchEvtIds=[];
          updateStats(5);
          await sleep(2000);
        }
      }
    }
  }
  if(batchCount>0){
    batchNum++;
    let ok=false;
    for(let retry=0;retry<3;retry++){
      try{await batch.commit();ok=true;totalEvents+=batchCount;totalOps+=batchCount;allEventIds.push(...batchEvtIds);log(`  최종 배치 #${batchNum}: 누적 ${totalEvents}건`,'info');break}
      catch(e){log(`  최종 배치 실패(${retry+1}/3): ${e.message}`,'warn');await sleep(3000)}
    }
    if(!ok){totalErrors+=batchCount}
  }
  log(`일정 생성 완료: 총 ${totalEvents}건 (실패 ${totalErrors}건)`,'ok');
  updateStats(5);

  // 4. Simulate concurrent edits (300건)
  log('4단계: 동시 수정 시뮬레이션 (300건)...');
  const editPromises=[];
  for(let i=0;i<300;i++){
    const evtId=rnd(allEventIds);
    const ref=calRef.collection('events').doc(evtId);
    editPromises.push(
      ref.update({
        title:rnd(TITLES)+'(수정됨)',
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      }).then(()=>{totalOps++}).catch(e=>{totalErrors++;log(`  수정 실패 ${evtId}: ${e.message}`,'err')})
    );
  }
  await Promise.all(editPromises);
  log(`동시 수정 완료`,'ok');
  updateStats(5);

  // 5. Simulate comments (200건)
  log('5단계: 댓글 추가 시뮬레이션 (200건)...');
  const cmtPromises=[];
  for(let i=0;i<200;i++){
    const evtId=rnd(allEventIds);
    const ref=calRef.collection('events').doc(evtId);
    const user=Math.floor(Math.random()*10);
    cmtPromises.push(
      ref.get().then(doc=>{
        if(!doc.exists)return;
        const d=doc.data();
        const comments=d.comments||[];
        comments.push({userId:'test_user_'+user,name:NAMES[user],text:'테스트 댓글 #'+i,time:new Date().toLocaleString('ko-KR')});
        return ref.update({comments,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      }).then(()=>{totalOps++}).catch(e=>{totalErrors++;})
    );
  }
  await Promise.all(cmtPromises);
  log(`댓글 추가 완료`,'ok');
  updateStats(5);

  // 6. Simulate deletions (200건)
  log('6단계: 삭제 시뮬레이션 (200건)...');
  const delIds=allEventIds.splice(0,200);
  const delPromises=delIds.map(id=>
    calRef.collection('events').doc(id).delete()
      .then(()=>{totalOps++;totalEvents--})
      .catch(e=>{totalErrors++})
  );
  await Promise.all(delPromises);
  log(`삭제 완료: ${delIds.length}건`,'ok');
  updateStats(5);

  // 7. Verify data integrity
  log('7단계: 데이터 무결성 검증...');
  const snap=await calRef.collection('events').get();
  const actualCount=snap.size;
  const expectedCount=totalEvents;
  log(`  Firestore 일정 수: ${actualCount}`,'info');
  log(`  예상 일정 수: ${expectedCount}`,'info');

  if(actualCount===expectedCount){
    log(`✅ 일정 수 일치!`,'ok');
  }else{
    log(`⚠️ 일정 수 불일치: 차이 ${Math.abs(actualCount-expectedCount)}건`,'warn');
  }

  // Check for data corruption
  let corrupted=0,noTitle=0,noDate=0,badComments=0;
  snap.forEach(doc=>{
    const d=doc.data();
    if(!d.title)noTitle++;
    if(!d.date)noDate++;
    if(d.comments&&!Array.isArray(d.comments))badComments++;
    if(!d.createdBy)corrupted++;
  });

  if(corrupted||noTitle||noDate||badComments){
    log(`❌ 데이터 손상 발견!`,'err');
    if(noTitle)log(`  제목 없음: ${noTitle}건`,'err');
    if(noDate)log(`  날짜 없음: ${noDate}건`,'err');
    if(badComments)log(`  댓글 손상: ${badComments}건`,'err');
    if(corrupted)log(`  생성자 없음: ${corrupted}건`,'err');
    totalErrors+=(corrupted+noTitle+noDate+badComments);
  }else{
    log(`✅ 데이터 무결성 검증 통과!`,'ok');
  }

  // 8. Test concurrent read/write
  log('8단계: 동시 읽기/쓰기 충돌 테스트 (50건)...');
  const conflictId=rnd(allEventIds);
  const conflictRef=calRef.collection('events').doc(conflictId);
  const conflictPromises=[];
  for(let i=0;i<50;i++){
    const user=i%5;
    conflictPromises.push(
      conflictRef.get().then(doc=>{
        if(!doc.exists)return;
        const d=doc.data();
        const comments=d.comments||[];
        comments.push({userId:'test_user_'+user,name:NAMES[user],text:'충돌 테스트 #'+i,time:new Date().toLocaleString('ko-KR')});
        return conflictRef.update({comments,title:d.title+'_'+i,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      }).then(()=>{totalOps++}).catch(e=>{totalErrors++;log(`  충돌 에러: ${e.message}`,'warn')})
    );
  }
  await Promise.all(conflictPromises);
  // Verify the conflicted event
  const conflictDoc=await conflictRef.get();
  if(conflictDoc.exists){
    const cd=conflictDoc.data();
    log(`  충돌 일정 최종 상태: 제목="${cd.title}", 댓글 ${(cd.comments||[]).length}개`,'info');
    if(cd.title&&cd.date&&Array.isArray(cd.comments)){
      log(`✅ 충돌 테스트 통과 (데이터 구조 정상)`,'ok');
    }else{
      log(`❌ 충돌 후 데이터 손상!`,'err');totalErrors++;
    }
  }

  // 9. Summary
  log('');
  log('========== 테스트 완료 ==========','ok');
  log(`총 일정: ${totalEvents}건`,'info');
  log(`총 동작: ${totalOps}건`,'info');
  log(`총 오류: ${totalErrors}건`,totalErrors?'err':'ok');
  if(totalErrors===0)log('🎉 모든 테스트 통과! 데이터 유실 없음!','ok');
  else log(`⚠️ ${totalErrors}건의 오류 발생 — 위 로그 확인 필요`,'warn');
  updateStats(5);
  document.getElementById('btn-run').disabled=false;
}

async function cleanup(){
  log('테스트 데이터 삭제 중...');
  try{
    await auth.signInAnonymously();
    const calRef=db.collection('calendars').doc(TEST_CAL_ID);
    // Delete events in batches
    let deleted=0;
    while(true){
      const snap=await calRef.collection('events').limit(500).get();
      if(snap.empty)break;
      const batch=db.batch();
      snap.forEach(doc=>batch.delete(doc.ref));
      await batch.commit();
      deleted+=snap.size;
      log(`  ${deleted}건 삭제됨...`);
    }
    // Delete categories
    const catSnap=await calRef.collection('categories').get();
    if(!catSnap.empty){const b=db.batch();catSnap.forEach(d=>b.delete(d.ref));await b.commit()}
    // Delete calendar doc
    await calRef.delete();
    // Delete invite code
    await db.collection('inviteCodes').doc('TSTCAL').delete().catch(()=>{});
    log(`✅ 삭제 완료: ${deleted}건`,'ok');
  }catch(e){log('삭제 실패: '+e.message,'err')}
}
</script>
</body>
</html>
