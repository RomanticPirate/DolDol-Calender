<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Our Days - 온보딩 미리보기</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #5B6AFF;
  --primary-light: #E8EAFF;
  --bg: #F5F6FA;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-sub: #7C7C8A;
  --border: #E8E8EE;
}
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); max-width: 480px; margin: 0 auto; min-height: 100vh; }

.onboarding {
  min-height: 100vh;
  background: linear-gradient(180deg, #FFF8F0 0%, #FFFFFF 60%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 32px 40px;
}

.title-img-wrap {
  width: 100%;
  max-width: 320px;
  margin-top: 40px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(91, 106, 255, 0.15);
}
.title-img-wrap img {
  width: 100%;
  display: block;
}

.app-name {
  font-size: 36px;
  font-weight: 800;
  color: var(--primary);
  margin-top: 24px;
  letter-spacing: -1px;
}

.app-desc {
  color: var(--text-sub);
  font-size: 15px;
  text-align: center;
  margin-top: 8px;
  line-height: 1.6;
}

.form-area {
  width: 100%;
  margin-top: 32px;
}

.form-input {
  width: 100%;
  padding: 16px 18px;
  border: 2px solid var(--border);
  border-radius: 14px;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
  text-align: center;
}
.form-input:focus {
  border-color: var(--primary);
}
.form-input::placeholder {
  color: #B0B0C0;
}

.btn-primary {
  width: 100%;
  padding: 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
  transition: opacity .2s, transform .15s;
  letter-spacing: 0.5px;
}
.btn-primary:active {
  opacity: 0.85;
  transform: scale(0.98);
}

.footer-note {
  margin-top: 24px;
  font-size: 12px;
  color: #B0B0C0;
  text-align: center;
}
</style>
</head>
<body>

<div class="onboarding">
  <div class="title-img-wrap">
    <img src="title_img.png" alt="Our Days 타이틀 이미지">
  </div>

  <div class="app-name">Our Days</div>
  <div class="app-desc">
    우리가 함께 하는 날들
  </div>

  <div class="form-area">
    <input type="text" class="form-input" placeholder="닉네임을 입력하세요" maxlength="10">
    <button class="btn-primary">시작하기</button>
  </div>

  <div class="footer-note">&copy; 2026 JJW. All rights reserved.</div>
</div>

</body>
</html>
