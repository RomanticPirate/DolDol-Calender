<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Firebase 연결 테스트</title></head>
<body style="font-family:sans-serif;padding:20px;max-width:480px;margin:0 auto">
<h2>Firebase 연결 테스트</h2>
<div id="log" style="background:#f5f5f5;padding:16px;border-radius:8px;font-size:14px;line-height:2"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const log = document.getElementById('log');
function addLog(msg, ok) {
  log.innerHTML += `<div>${ok ? '✅' : '❌'} ${msg}</div>`;
}

async function test() {
  // 1. Firebase 초기화
  try {
    const app = firebase.initializeApp({
      apiKey: "AIzaSyD8ZGwmpiLAvACR5OI1zxabE2evnqXPQ1Y",
      authDomain: "doldol-calendar.firebaseapp.com",
      projectId: "doldol-calendar",
      storageBucket: "doldol-calendar.firebasestorage.app",
      messagingSenderId: "904326266675",
      appId: "1:904326266675:web:195d04ae46b04cdbeec846"
    });
    addLog('Firebase 초기화 성공', true);
  } catch(e) { addLog('Firebase 초기화 실패: ' + e.message, false); return; }

  // 2. Anonymous Auth
  try {
    const result = await firebase.auth().signInAnonymously();
    addLog(`익명 로그인 성공 (UID: ${result.user.uid})`, true);
  } catch(e) { addLog('익명 로그인 실패: ' + e.message, false); return; }

  // 3. Firestore 쓰기
  const db = firebase.firestore();
  try {
    await db.collection('_test').doc('ping').set({
      message: '테스트 성공!',
      time: new Date().toISOString()
    });
    addLog('Firestore 쓰기 성공', true);
  } catch(e) { addLog('Firestore 쓰기 실패: ' + e.message, false); return; }

  // 4. Firestore 읽기
  try {
    const doc = await db.collection('_test').doc('ping').get();
    addLog(`Firestore 읽기 성공: "${doc.data().message}"`, true);
  } catch(e) { addLog('Firestore 읽기 실패: ' + e.message, false); return; }

  // 5. 삭제 (정리)
  try {
    await db.collection('_test').doc('ping').delete();
    addLog('테스트 데이터 정리 완료', true);
  } catch(e) { addLog('정리 실패: ' + e.message, false); }

  addLog('<br><b>🎉 모든 테스트 통과! Firebase 설정 완료!</b>', true);
}

test();
</script>
</body>
</html>
